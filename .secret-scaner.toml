[scan]
max_file_size_kb = 1024
follow_symlinks = false
workers = 4

[output]
format = "text"
show_snippet = true
mask_secrets = true

[severity]
fail_on = ["high", "critical"]

[baseline]
path = ".secrets.baseline.json"
use_baseline = true

[filters]
ignore_paths = [
  "node_modules/**",
  "dist/**",
  "build/**",
  ".venv/**",
  "vendor/**"
]
dummy_values = [
  "test",
  "dummy",
  "example",
  "changeme",
  "your_api_key_here",
  "xxx"
]
suppress_test_paths = false
inline_ignore_markers = ["secret-scan: ignore"]

[detectors]
enabled = [
  "private_key",
  "generic_assignment",
  "jwt",
  "uri_credentials"
]